name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # `npm ci` is strict about platform-specific optional deps that
      # appear in the lock file. jiti's @rolldown/* transitive deps
      # resolve to different @emnapi versions on macOS vs Linux, so we
      # use `npm install` here to tolerate that drift while still
      # respecting the lock file for direct deps.
      - run: npm install --no-audit --no-fund --no-progress

      - name: Security audit (runtime deps, high severity)
        run: npm audit --audit-level=high --omit=dev

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
